<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 CP 에디터 (App 2) - 생산/검토용</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 엑셀 저장 및 파일 생성 라이브러리 (App 2 전용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 구글 API -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>

    <!-- LZ-String 압축 해제 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        body { font-family: 'Noto Sans KR', sans-serif; }

        @media print {
            @page { size: A4 portrait; margin: 5mm; }
            body { background: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; zoom: 1; }
            .print\:hidden { display: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:m-0 { margin: 0 !important; }
            table { width: 100% !important; border-collapse: collapse; page-break-inside: auto; }
            th, td { border: 1px solid #9ca3af !important; padding: 2px !important; white-space: nowrap; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            .break-before-page { page-break-before: always; }
            #sidebar, .tabs-container { display: none !important; }
            #main-content { margin-left: 0 !important; padding: 0 !important; width: 100% !important; }
        }

        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .modal-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .input-cell {
            width: 100%; height: 100%; border: none; background: transparent; text-align: center; outline: none;
        }
        .input-cell:focus { background-color: #e0f2fe; font-weight: bold; }

        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously };
        window.dispatchEvent(new Event('firebase-sdk-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, memo, useCallback, useMemo } = React;

        // --- Icons ---
        const IconWrapper = ({ children, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Trash2 = (props) => <IconWrapper {...props}><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></IconWrapper>;
        const Calculator = (props) => <IconWrapper {...props}><rect width="16" height="20" x="4" y="2" rx="2" /><line x1="8" x2="16" y1="6" y2="6" /><line x1="16" x2="16" y1="14" y2="18" /><path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" /><path d="M12 14h.01" /><path d="M8 14h.01" /><path d="M12 18h.01" /><path d="M8 18h.01" /></IconWrapper>;
        const FileDown = (props) => <IconWrapper {...props}><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4" /><polyline points="14 2 14 8 20 8" /><path d="M2 15h10" /><path d="M9 18l3-3-3-3" /></IconWrapper>;
        const Building = (props) => <IconWrapper {...props}><rect x="4" y="2" width="16" height="20" rx="2" ry="2" /><path d="M9 22v-4h6v4" /><path d="M8 6h.01" /><path d="M16 6h.01" /><path d="M8 10h.01" /><path d="M16 10h.01" /><path d="M8 14h.01" /><path d="M16 14h.01" /><path d="M8 18h.01" /><path d="M16 18h.01" /></IconWrapper>;
        const Layers = (props) => <IconWrapper {...props}><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /><polyline points="2 12 12 17 22 12" /></IconWrapper>;
        const Edit3 = (props) => <IconWrapper {...props}><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></IconWrapper>;
        const EyeOff = (props) => <IconWrapper {...props}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></IconWrapper>;
        const Eye = (props) => <IconWrapper {...props}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></IconWrapper>;
        const Copy = (props) => <IconWrapper {...props}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></IconWrapper>;
        const Cloud = (props) => <IconWrapper {...props}><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></IconWrapper>;
        const FileCode = (props) => <IconWrapper {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><polyline points="10 13 8 15 10 17"/><polyline points="14 13 16 15 14 17"/></IconWrapper>;
        const Check = (props) => <IconWrapper {...props}><polyline points="20 6 9 17 4 12"></polyline></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconWrapper>;
        const ListTree = (props) => <IconWrapper {...props}><path d="M21 12h-8"/><path d="M21 6H8"/><path d="M21 18h-8"/><path d="M12 12s-3-3-3-3v6s-3-3-3-3"/></IconWrapper>;

        const UNIT_WEIGHT_DATA = {
            "100-100-3.2": 9.52, "100-100-3.0": 8.96, "100-100-2.3": 6.95, "100-100-2.1": 6.37,
            "100-50-2.1": 4.72, "75-75-2.1": 4.72, "50-50-2.1": 3.07
        };

        // --- Google Sheets Configuration (App 2 uses Write Scopes) ---
        const CLIENT_ID = '791608320864-ro52gqaonn7ppkoib6due2m48sfv9969.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyBoOVQF_WEEiIZqFIA89ET2Rvt95CUjzWk';
        const SPREADSHEET_ID = '1I0-XY4ZjhbjCBHEbZ36B8QSKb99CQk2aBHgBpBMGLWc';
        const DISCOVERY_DOC = 'https://sheets.googleapis.com/$discovery/rest?version=v4';
        const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

        const SHEET_ROW_MAP = [
            { row: 5, w: 50, h: 50, t: '2.1', l: 6000 },
            { row: 7, w: 75, h: 75, t: '2.1', l: 6000 }, { row: 8, w: 75, h: 75, t: '2.1', l: 6600 }, { row: 9, w: 75, h: 75, t: '2.1', l: 7200 }, { row: 10, w: 75, h: 75, t: '2.1', l: 8000 },
            { row: 12, w: 100, h: 50, t: '2.1', l: 5000 }, { row: 13, w: 100, h: 50, t: '2.1', l: 6000 }, { row: 14, w: 100, h: 50, t: '2.1', l: 6600 }, { row: 15, w: 100, h: 50, t: '2.1', l: 7200 }, { row: 16, w: 100, h: 50, t: '2.1', l: 8200 },
            { row: 18, w: 100, h: 100, t: '2.1', l: 5000 }, { row: 19, w: 100, h: 100, t: '2.1', l: 6000 }, { row: 20, w: 100, h: 100, t: '2.1', l: 6600 }, { row: 21, w: 100, h: 100, t: '2.1', l: 7200 }, { row: 22, w: 100, h: 100, t: '2.1', l: 8000 },
            { row: 24, w: 100, h: 100, t: '2.3', l: 5000 }, { row: 25, w: 100, h: 100, t: '2.3', l: 6000 }, { row: 26, w: 100, h: 100, t: '2.3', l: 7200 }, { row: 27, w: 100, h: 100, t: '2.3', l: 8000 },
            { row: 29, w: 100, h: 100, t: '3.0', l: 5000 }, { row: 30, w: 100, h: 100, t: '3.0', l: 6000 }, { row: 31, w: 100, h: 100, t: '3.0', l: 7200 }, { row: 32, w: 100, h: 100, t: '3.0', l: 8000 },
            { row: 34, w: 100, h: 100, t: '3.2', l: 6000 }, { row: 35, w: 100, h: 100, t: '3.2', l: 6200 }, { row: 36, w: 100, h: 100, t: '3.2', l: 7200 }, { row: 37, w: 100, h: 100, t: '3.2', l: 8000 }
        ];

        const getUnitWeight = (w, h, t) => {
            const dims = [parseInt(w), parseInt(h)].sort((a, b) => b - a);
            const key = `${dims[0]}-${dims[1]}-${t}`;
            return UNIT_WEIGHT_DATA[key] || 0;
        };

        // --- Modals for Per-Dong Version Selection ---
        const DongModeSelector = ({ dongs, dongModes, setDongModes }) => (
            <div className="mt-3 max-h-40 overflow-y-auto border border-gray-200 rounded-lg bg-gray-50 p-2 space-y-2">
                {dongs.map(dName => (
                    <div key={dName} className="flex justify-between items-center text-sm bg-white p-2 rounded shadow-sm">
                        <span className="font-bold text-gray-700 flex items-center gap-1"><Building size={14} className="text-gray-400"/> {dName}</span>
                        <select className="border-gray-300 rounded text-xs font-bold p-1 bg-gray-50 focus:ring-2 focus:ring-blue-400 outline-none"
                            value={dongModes[dName] || 'min_rows'}
                            onChange={(e) => setDongModes(prev => ({...prev, [dName]: e.target.value}))}
                        >
                            <option value="min_rows">작업 편의</option>
                            <option value="min_loss">LOSS 최소화</option>
                            <option value="manual_result">수동 편집 결과</option>
                        </select>
                    </div>
                ))}
            </div>
        );

        const ExcelExportModal = ({ isOpen, onClose, onConfirm, dongs, resultsByDong }) => {
            if (!isOpen) return null;
            const [targetType, setTargetType] = useState('current');
            const [modeType, setModeType] = useState('min_rows'); // For current dong
            const [dongModes, setDongModes] = useState(() => dongs.reduce((acc, d) => ({...acc, [d]: 'min_rows'}), {}));

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
                    <div className="bg-white rounded-xl shadow-2xl p-6 w-[420px] modal-fade-in relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><X size={20} /></button>
                        <h3 className="text-xl font-bold mb-6 flex items-center gap-2"><FileDown className="text-green-600" /> 엑셀 다운로드 (스마트 설정)</h3>
                        <div className="space-y-6">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">저장 대상 범위</label>
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={() => setTargetType('current')} className={`p-3 rounded-lg border text-sm font-bold flex items-center justify-center gap-2 transition ${targetType === 'current' ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-200 hover:bg-gray-50'}`}>현재 동만</button>
                                    <button onClick={() => setTargetType('all')} className={`p-3 rounded-lg border text-sm font-bold flex items-center justify-center gap-2 transition ${targetType === 'all' ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-200 hover:bg-gray-50'}`}>전체 동 병합</button>
                                </div>
                            </div>
                            
                            {targetType === 'current' ? (
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">저장 버전 선택</label>
                                    <div className="space-y-2">
                                        <button onClick={() => setModeType('min_rows')} className={`w-full p-3 rounded-lg border text-left text-sm font-medium transition flex justify-between items-center ${modeType === 'min_rows' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 hover:bg-gray-50'}`}>
                                            <span>① 작업 편의 (Work Convenience)</span>{modeType === 'min_rows' && <Check size={16} />}
                                        </button>
                                        <button onClick={() => setModeType('min_loss')} className={`w-full p-3 rounded-lg border text-left text-sm font-medium transition flex justify-between items-center ${modeType === 'min_loss' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 hover:bg-gray-50'}`}>
                                            <span>② LOSS 최소화 (자재 절약)</span>{modeType === 'min_loss' && <Check size={16} />}
                                        </button>
                                        <button onClick={() => setModeType('manual_result')} className={`w-full p-3 rounded-lg border text-left text-sm font-medium transition flex justify-between items-center ${modeType === 'manual_result' ? 'border-purple-500 bg-purple-50 text-purple-700' : 'border-gray-200 hover:bg-gray-50'}`}>
                                            <span>③ 수동 편집 결과</span>{modeType === 'manual_result' && <Check size={16} />}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">동별 버전 선택</label>
                                    <p className="text-[10px] text-gray-500 mb-2">각 동마다 어떤 결과물(작업편의/LOSS최소/수동)을 병합할지 선택하세요.</p>
                                    <DongModeSelector dongs={dongs} dongModes={dongModes} setDongModes={setDongModes} />
                                </div>
                            )}
                        </div>
                        <button onClick={() => onConfirm(targetType, targetType === 'current' ? modeType : dongModes)} className="w-full mt-8 bg-green-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-green-700 transition flex justify-center items-center gap-2"><FileDown size={18} /> 엑셀 파일 생성</button>
                    </div>
                </div>
            );
        };

        const StockDeductModal = ({ isOpen, onClose, onConfirm, dongs, isLoggedIn, handleLogin }) => {
            if (!isOpen) return null;
            const [targetType, setTargetType] = useState('current');
            const [modeType, setModeType] = useState('min_rows');
            const [dongModes, setDongModes] = useState(() => dongs.reduce((acc, d) => ({...acc, [d]: 'min_rows'}), {}));

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
                    <div className="bg-white rounded-xl shadow-2xl p-6 w-[420px] modal-fade-in relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><X size={20} /></button>
                        <h3 className="text-xl font-bold mb-6 flex items-center gap-2"><Cloud className="text-red-500" /> 재고 차감 (구글 시트 연동)</h3>
                        
                        {!isLoggedIn ? (
                            <div className="text-center py-6">
                                <p className="text-sm text-gray-500 mb-4">재고를 차감하려면 구글 로그인이 필요합니다.</p>
                                <button onClick={handleLogin} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition">구글 로그인</button>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">차감 대상 범위</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => setTargetType('current')} className={`p-3 rounded-lg border text-sm font-bold flex items-center justify-center gap-2 transition ${targetType === 'current' ? 'border-red-500 bg-red-50 text-red-700' : 'border-gray-200 hover:bg-gray-50'}`}>현재 동만</button>
                                        <button onClick={() => setTargetType('all')} className={`p-3 rounded-lg border text-sm font-bold flex items-center justify-center gap-2 transition ${targetType === 'all' ? 'border-red-500 bg-red-50 text-red-700' : 'border-gray-200 hover:bg-gray-50'}`}>전체 동</button>
                                    </div>
                                </div>
                                {targetType === 'current' ? (
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">사용할 CP 버전</label>
                                        <div className="space-y-2">
                                            <button onClick={() => setModeType('min_rows')} className={`w-full p-3 rounded-lg border text-left text-sm font-medium transition flex justify-between items-center ${modeType === 'min_rows' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 hover:bg-gray-50'}`}>
                                                <span>① 작업 편의 (Work Convenience)</span>{modeType === 'min_rows' && <Check size={16} />}
                                            </button>
                                            <button onClick={() => setModeType('min_loss')} className={`w-full p-3 rounded-lg border text-left text-sm font-medium transition flex justify-between items-center ${modeType === 'min_loss' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 hover:bg-gray-50'}`}>
                                                <span>② LOSS 최소화 (자재 절약)</span>{modeType === 'min_loss' && <Check size={16} />}
                                            </button>
                                            <button onClick={() => setModeType('manual_result')} className={`w-full p-3 rounded-lg border text-left text-sm font-medium transition flex justify-between items-center ${modeType === 'manual_result' ? 'border-purple-500 bg-purple-50 text-purple-700' : 'border-gray-200 hover:bg-gray-50'}`}>
                                                <span>③ 수동 편집 결과</span>{modeType === 'manual_result' && <Check size={16} />}
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">동별 버전 선택</label>
                                        <DongModeSelector dongs={dongs} dongModes={dongModes} setDongModes={setDongModes} />
                                    </div>
                                )}
                                <button onClick={() => onConfirm(targetType, targetType === 'current' ? modeType : dongModes)} className="w-full mt-8 bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-red-700 transition flex justify-center items-center gap-2"><Cloud size={18} /> 재고 차감 실행</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const DongTabs = ({ dongs, currentDong, setCurrentDong }) => (
            <div className="flex gap-2 mb-4 overflow-x-auto pb-2 border-b items-center print:hidden">
                {dongs.map(dong => (
                    <button key={dong} onClick={() => setCurrentDong(dong)} className={`px-4 py-2 rounded-t-lg font-bold text-sm whitespace-nowrap transition ${currentDong === dong ? 'bg-white border-x border-t border-gray-200 text-blue-600 relative top-[1px]' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                        <span className="flex items-center gap-2"><Building size={14} /> {dong}</span>
                    </button>
                ))}
            </div>
        );

        // --- App1에서 가져온 데이터를 원본 그대로 보여주는 컴포넌트 ---
        const OriginalDataView = ({ currentDong, dongs, setCurrentDong, dongData, isNoDongMode }) => {
            const data = dongData[currentDong];
            
            if (!data || !data.parsedItems || data.parsedItems.length === 0) {
                return (
                    <div className="text-center py-20 bg-white rounded-xl border border-dashed border-gray-300 text-gray-400">
                        <p>현재 동({currentDong})에 대한 원본 견적 데이터가 없습니다.</p>
                    </div>
                );
            }

            return (
                <div className="animate-fade-in pb-20 flex flex-col h-[calc(100vh-100px)]">
                    <div className="flex justify-between items-center mb-4 print:hidden">
                        <h2 className="text-lg font-bold text-gray-800">원본 견적 데이터 조회 (App 1) {isNoDongMode ? '' : `(${currentDong})`}</h2>
                        <span className="text-xs text-gray-500">※ 이 화면은 App 1에서 복사된 초기 입력 데이터입니다. 수정은 불가능합니다.</span>
                    </div>
                    {!isNoDongMode && <DongTabs dongs={dongs} currentDong={currentDong} setCurrentDong={setCurrentDong} />}
                    
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 flex-1 overflow-hidden flex flex-col">
                        <div className="p-3 border-b bg-gray-50 flex gap-4">
                            <div className="text-sm">기본 규격: <b>{data.spec}</b></div>
                            <div className="text-sm">두께: <b>{data.thickness}T</b></div>
                            <div className="text-sm ml-auto">총 파트 수: <b>{data.parsedItems.length}</b></div>
                        </div>
                        <div className="flex-1 overflow-auto custom-scrollbar p-4">
                            <table className="w-full text-sm text-center border-collapse">
                                <thead className="sticky top-0 bg-gray-100 shadow-sm">
                                    <tr className="border-b">
                                        <th className="p-2 border">#</th>
                                        <th className="p-2 border">규격 (T/W/H)</th>
                                        <th className="p-2 border">길이(mm)</th>
                                        <th className="p-2 border">수량(개)</th>
                                        <th className="p-2 border">마킹</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {data.parsedItems.map((item, i) => (
                                        <tr key={i} className="border-b hover:bg-blue-50">
                                            <td className="p-2 border text-gray-500">{i + 1}</td>
                                            <td className="p-2 border">{item.t} / {item.w} / {item.h}</td>
                                            <td className="p-2 border font-bold text-blue-700">{item.length}</td>
                                            <td className="p-2 border font-bold">{item.qty}</td>
                                            <td className="p-2 border text-left px-4">{item.marking}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Manual / Editor View (With Excel-like keyboard & select features) ---
        const ManualCPView = ({ currentDong, dongs, setCurrentDong, manualData, setManualData, projectInfo, onConvert, isNoDongMode, dongData }) => {
            const rows = manualData[currentDong] || [];
            const [hideEmpty, setHideEmpty] = useState(false);
            
            // --- 다중 셀 선택 및 합산 기능 (우측 패널) ---
            const [selectedCells, setSelectedCells] = useState(new Map());
            
            const handleCellClick = (e, id, value) => {
                const val = parseFloat(value) || 0;
                if (e.ctrlKey || e.metaKey) {
                    const newMap = new Map(selectedCells);
                    if (newMap.has(id)) newMap.delete(id);
                    else newMap.set(id, val);
                    setSelectedCells(newMap);
                } else {
                    setSelectedCells(new Map([[id, val]]));
                }
            };

            const selectedSum = Array.from(selectedCells.values()).reduce((a, b) => a + b, 0);

            // --- 키보드 기하학적 이동 (상하좌우) 기능 ---
            const handleKeyDown = (e) => {
                if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) return;
                
                const inputs = Array.from(document.querySelectorAll('input.input-cell:not([disabled])'));
                const currentIndex = inputs.indexOf(e.target);
                if (currentIndex === -1) return;

                if (e.key === 'ArrowLeft') { e.preventDefault(); if (inputs[currentIndex - 1]) inputs[currentIndex - 1].focus(); return; }
                if (e.key === 'ArrowRight') { e.preventDefault(); if (inputs[currentIndex + 1]) inputs[currentIndex + 1].focus(); return; }

                const rect = e.target.getBoundingClientRect();
                let nextInput = null;
                let minDistance = Infinity;

                inputs.forEach((input, i) => {
                    if (i === currentIndex) return;
                    const r = input.getBoundingClientRect();
                    if (Math.abs(r.left - rect.left) < 30) {
                        if (e.key === 'ArrowDown' && r.top >= rect.bottom - 5) {
                            const dist = r.top - rect.bottom;
                            if (dist < minDistance) { minDistance = dist; nextInput = input; }
                        }
                        if (e.key === 'ArrowUp' && r.bottom <= rect.top + 5) {
                            const dist = rect.top - r.bottom;
                            if (dist < minDistance) { minDistance = dist; nextInput = input; }
                        }
                    }
                });

                if (nextInput) {
                    e.preventDefault();
                    nextInput.focus();
                    nextInput.select();
                }
            };

            const updateRows = (newRows) => { setManualData(prev => ({ ...prev, [currentDong]: newRows })); };
            const addStockRow = () => { const lastRow = rows.length > 0 ? rows[rows.length - 1] : { t: '2.1', w: '100', h: '100', l: 6000, qty: 1 }; const newRow = { id: Date.now(), t: lastRow.t, w: lastRow.w, h: lastRow.h, l: lastRow.l, qty: 1, cuts: Array(8).fill().map(() => ({ l: '', count: '', marking: '' })) }; updateRows([...rows, newRow]); };
            const handleStockChange = (rIdx, field, val) => { const newRows = [...rows]; newRows[rIdx] = { ...newRows[rIdx], [field]: val }; updateRows(newRows); };
            const handleCutChange = (rIdx, cIdx, field, val) => { const newRows = [...rows]; const newCuts = [...newRows[rIdx].cuts]; newCuts[cIdx] = { ...newCuts[cIdx], [field]: val }; newRows[rIdx] = { ...newRows[rIdx], cuts: newCuts }; updateRows(newRows); };
            const removeStockRow = (rIdx) => { if (confirm('이 원본 행을 삭제하시겠습니까?')) { const newRows = rows.filter((_, i) => i !== rIdx); updateRows(newRows); } };
            const sortRowsByLength = () => { const newRows = [...rows].sort((a, b) => { if (a.t !== b.t) return parseFloat(b.t) - parseFloat(a.t); if (a.w !== b.w) return parseFloat(b.w) - parseFloat(a.w); if (a.h !== b.h) return parseFloat(b.h) - parseFloat(a.h); return b.l - a.l; }); updateRows(newRows); };
            
            // App1에서 넘어온 견적서 원본 데이터(dongData)를 파싱
            const parsedItems = dongData[currentDong]?.parsedItems || [];
            
            // 필요 물량 (원본)
            const requiredItems = useMemo(() => { 
                const grouped = {}; 
                (parsedItems || []).forEach(item => { 
                    const itemMarking = item.marking ? String(item.marking).trim() : ''; 
                    // 두께, 넓이, 높이, 길이, 마킹이 같으면 같은 항목으로 묶음
                    const key = `${item.t}|${item.w}|${item.h}|${item.length}|${itemMarking}`; 
                    if (!grouped[key]) grouped[key] = { ...item, marking: itemMarking, required: 0, used: 0 }; 
                    grouped[key].required += item.qty; 
                }); 
                return Object.values(grouped).sort((a, b) => b.length - a.length); 
            }, [parsedItems]);

            // 남은 물량 (실시간 연동)
            const remainingItems = useMemo(() => { 
                const status = JSON.parse(JSON.stringify(requiredItems)); 
                (rows || []).forEach(row => { 
                    if (Array.isArray(row.cuts)) { 
                        row.cuts.forEach(cut => { 
                            if (cut.l && cut.count) { 
                                const cutLen = parseFloat(cut.l); 
                                const totalCutCount = parseInt(cut.count) * parseInt(row.qty || 0); 
                                const cutMarking = cut.marking ? String(cut.marking).trim() : ''; 
                                
                                // 현재 입력한 값과 견적서의 값이 정확히 일치하는지 확인 (두께, 넓이, 높이, 길이, 마킹)
                                const match = status.find(item => 
                                    Math.abs(item.length - cutLen) < 0.1 && 
                                    (item.marking || '') === cutMarking && 
                                    item.t == row.t && 
                                    item.w == row.w && 
                                    item.h == row.h
                                ); 
                                if (match) { 
                                    match.used += totalCutCount; 
                                } 
                            } 
                        }); 
                    } 
                }); 
                return status; 
            }, [requiredItems, rows]);

            // Clear selected cells if tab changes to avoid mismatched keys
            useEffect(() => { setSelectedCells(new Map()); }, [currentDong]);

            return (
                <div className="animate-fade-in pb-20 flex gap-4 h-[calc(100vh-100px)] relative">
                    <div className="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                        <div className="p-3 border-b bg-gray-50 flex justify-between items-center shrink-0">
                            <h2 className="font-bold flex items-center gap-2 text-indigo-700"><Edit3 size={18} className="text-indigo-600" /> CP 직접 편집 (App 2) {isNoDongMode ? '' : `(${currentDong})`}</h2>
                            <div className="flex gap-2">
                                <span className="text-xs text-gray-500 mr-2 self-center">💡 셀에서 방향키(↑↓←→) 이동 지원</span>
                                <button onClick={() => setHideEmpty(!hideEmpty)} className={`px-3 py-1.5 text-xs font-bold rounded flex items-center gap-1 border ${hideEmpty ? 'bg-blue-100 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-300'}`}>{hideEmpty ? <EyeOff size={14} /> : <Eye size={14} />} 빈칸 {hideEmpty ? '보이기' : '숨기기'}</button>
                                <button onClick={sortRowsByLength} className="px-3 py-1.5 text-xs font-bold rounded bg-white border border-gray-300 text-gray-600 hover:bg-gray-50">길이순 정렬</button>
                                <button onClick={() => onConvert(rows)} className="px-3 py-1.5 text-xs font-bold rounded bg-blue-600 text-white hover:bg-blue-700 flex items-center gap-1"><Check size={14} /> [수동 결과]로 등록 및 엑셀 저장</button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-auto custom-scrollbar bg-white p-4" onKeyDown={handleKeyDown}>
                            {!isNoDongMode && <DongTabs dongs={dongs} currentDong={currentDong} setCurrentDong={setCurrentDong} />}
                            <table className="w-full border-collapse text-xs text-center shadow-sm">
                                <thead className="sticky top-0 z-10">
                                    <tr className="bg-indigo-50 h-8 border-y border-gray-300 text-gray-700 font-bold">
                                        <th className="border w-10">순번</th>
                                        <th className="border w-12">두께</th>
                                        <th className="border w-12">장변</th>
                                        <th className="border w-12">단변</th>
                                        <th className="border w-16">길이</th>
                                        <th className="border w-12">수량</th>
                                        <th className="border w-16 bg-white border-2 border-indigo-100 text-indigo-700">길이</th>
                                        <th className="border w-12 bg-white border-2 border-indigo-100 text-indigo-700">컷팅수</th>
                                        <th className="border w-12 bg-white border-2 border-indigo-100 text-indigo-700">수량</th>
                                        <th className="border bg-white border-2 border-indigo-100 text-indigo-700">마킹</th>
                                        <th className="border w-16">본당LOSS</th>
                                        <th className="border w-20">총LOSS</th>
                                        <th className="border w-12">비고</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {(rows || []).map((row, rIdx) => {
                                        const cuts = Array.isArray(row.cuts) ? row.cuts : [];
                                        const visibleCuts = hideEmpty ? cuts.filter(c => c.l && c.count) : cuts;
                                        const renderCuts = visibleCuts.length > 0 ? visibleCuts : (hideEmpty ? [] : cuts);
                                        const rowSpan = Math.max(1, renderCuts.length);
                                        const usedLength = cuts.reduce((acc, c) => acc + (parseFloat(c.l || 0) * parseFloat(c.count || 0)), 0);
                                        const lossPerBar = row.l - usedLength;
                                        const totalRowLoss = lossPerBar * row.qty;
                                        
                                        // App 1과 동일한 하이라이트 조건
                                        const maxPartLength = Math.max(...cuts.map(p => parseFloat(p.l || 0)));
                                        const isHighlightCondition = lossPerBar <= 270 && maxPartLength >= 1000 && maxPartLength <= 2700;

                                        return (
                                            <React.Fragment key={row.id || rIdx}>
                                                {renderCuts.map((cut, cIdx) => {
                                                    const isFirst = cIdx === 0;
                                                    const cutQty = (parseInt(cut.count) * parseInt(row.qty)) || '';
                                                    return (
                                                        <tr key={cIdx} className="border-b border-gray-200 hover:bg-gray-50 h-8">
                                                            {isFirst && (<><td rowSpan={rowSpan} className={`border font-bold relative group ${isHighlightCondition ? 'bg-purple-200 text-purple-900 border-purple-400' : 'bg-yellow-50'}`}>{rIdx + 1}<button onClick={() => removeStockRow(rIdx)} className="absolute left-0 top-0 text-red-400 opacity-0 group-hover:opacity-100 p-0.5"><Trash2 size={10} /></button></td><td rowSpan={rowSpan} className="border bg-yellow-50 p-0"><input className="input-cell bg-yellow-50" value={row.t} onChange={e => handleStockChange(rIdx, 't', e.target.value)} /></td><td rowSpan={rowSpan} className="border bg-yellow-50 p-0"><input className="input-cell bg-yellow-50" value={row.w} onChange={e => handleStockChange(rIdx, 'w', e.target.value)} /></td><td rowSpan={rowSpan} className="border bg-yellow-50 p-0"><input className="input-cell bg-yellow-50" value={row.h} onChange={e => handleStockChange(rIdx, 'h', e.target.value)} /></td><td rowSpan={rowSpan} className="border bg-yellow-50 p-0"><input type="number" className="input-cell bg-yellow-50 font-bold" value={row.l} onChange={e => handleStockChange(rIdx, 'l', e.target.value)} /></td><td rowSpan={rowSpan} className="border bg-yellow-50 p-0"><input type="number" className="input-cell bg-yellow-50" value={row.qty} onChange={e => handleStockChange(rIdx, 'qty', e.target.value)} /></td></>)}
                                                            <td className="border p-0"><input type="number" className="input-cell" value={cut.l} onChange={e => handleCutChange(rIdx, cuts.indexOf(cut), 'l', e.target.value)} /></td><td className="border p-0"><input type="number" className="input-cell" value={cut.count} onChange={e => handleCutChange(rIdx, cuts.indexOf(cut), 'count', e.target.value)} /></td><td className="border bg-gray-50 text-gray-500">{cutQty ? cutQty.toLocaleString() : ''}</td><td className="border p-0"><input className="input-cell text-left px-1" value={cut.marking} onChange={e => handleCutChange(rIdx, cuts.indexOf(cut), 'marking', e.target.value)} /></td>
                                                            {isFirst && (<><td rowSpan={rowSpan} className={`border font-bold ${lossPerBar >= 400 ? 'text-red-600 bg-[#FFCCBC]' : (lossPerBar < 100 ? 'text-red-500' : 'text-gray-700')}`}>{lossPerBar.toLocaleString()}</td><td rowSpan={rowSpan} className="border text-gray-600">{totalRowLoss.toLocaleString()}</td><td rowSpan={rowSpan} className="border"></td></>)}
                                                        </tr>
                                                    );
                                                })}
                                                <tr className="h-1 bg-gray-100 border-t border-gray-300"><td colSpan="13"></td></tr>
                                            </React.Fragment>
                                        );
                                    })}
                                </tbody>
                            </table>
                            <button onClick={addStockRow} className="w-full mt-4 py-3 border-2 border-dashed border-indigo-300 rounded-lg text-indigo-400 hover:border-indigo-500 hover:text-indigo-600 font-bold transition">+ 수동 원본 추가</button>
                        </div>
                    </div>
                    
                    {/* 우측 패널 (다중 셀 선택 가능 및 견적 연동) */}
                    <div className="w-80 flex flex-col gap-4 relative">
                        <div className="text-xs text-right text-gray-500 pb-1">💡 <b>Ctrl + 클릭</b>으로 다중 수량 선택 및 합산</div>
                        <div className="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                            <div className="p-2 bg-gray-800 text-white font-bold text-sm text-center">견적 물량 (App 1 원본)</div>
                            <div className="flex-1 overflow-auto custom-scrollbar p-2">
                                <table className="w-full text-xs text-center border-collapse">
                                    <thead className="sticky top-0 bg-white shadow-sm"><tr className="bg-gray-100 border-b"><th className="p-1">규격(T/W/H)</th><th className="p-1">길이</th><th className="p-1">수량</th><th className="p-1">마킹</th></tr></thead>
                                    <tbody>
                                        {requiredItems.length === 0 && (
                                            <tr><td colSpan="4" className="py-4 text-gray-400">데이터 없음</td></tr>
                                        )}
                                        {requiredItems.map((item, i) => {
                                            const id = `req-${i}`;
                                            const isSelected = selectedCells.has(id);
                                            return (
                                                <tr key={i} className={`border-b hover:bg-gray-50 ${isSelected ? 'bg-blue-100' : ''}`} onClick={(e) => handleCellClick(e, id, item.required)}>
                                                    <td className="p-1 cursor-default">{item.t}/{item.w}/{item.h}</td>
                                                    <td className="p-1 font-bold cursor-default">{item.length}</td>
                                                    <td className={`p-1 cursor-pointer font-bold ${isSelected ? 'text-blue-700' : ''}`}>{item.required}</td>
                                                    <td className="p-1 text-left truncate max-w-[80px] cursor-default" title={item.marking}>{item.marking}</td>
                                                </tr>
                                            )
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div className="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                            <div className="p-2 bg-indigo-600 text-white font-bold text-sm text-center">남은 물량 (실시간)</div>
                            <div className="flex-1 overflow-auto custom-scrollbar p-2">
                                <table className="w-full text-xs text-center border-collapse">
                                    <thead className="sticky top-0 bg-white shadow-sm"><tr className="bg-indigo-50 border-b border-indigo-200"><th className="p-1">규격</th><th className="p-1">길이</th><th className="p-1">잔여</th><th className="p-1">마킹</th></tr></thead>
                                    <tbody>
                                        {remainingItems.length === 0 && (
                                            <tr><td colSpan="4" className="py-4 text-gray-400">데이터 없음</td></tr>
                                        )}
                                        {remainingItems.map((item, i) => { 
                                            const remaining = item.required - item.used; 
                                            const isDone = remaining <= 0; 
                                            const id = `rem-${i}`;
                                            const isSelected = selectedCells.has(id);
                                            return (
                                                <tr key={i} className={`border-b ${isDone ? 'bg-gray-100 text-gray-400' : 'hover:bg-indigo-50'} ${isSelected ? 'bg-blue-100' : ''}`} onClick={(e) => !isDone && handleCellClick(e, id, remaining)}>
                                                    <td className="p-1 cursor-default">{item.t}/{item.w}/{item.h}</td>
                                                    <td className="p-1 font-bold cursor-default">{item.length}</td>
                                                    <td className={`p-1 cursor-pointer font-bold ${remaining < 0 ? 'text-red-500' : (remaining === 0 ? 'text-green-500' : (isSelected ? 'text-blue-700' : 'text-black'))}`}>{remaining}</td>
                                                    <td className="p-1 text-left truncate max-w-[60px] cursor-default" title={item.marking}>{item.marking}</td>
                                                </tr>
                                            ); 
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* 엑셀 스타일 다중 선택 합계 플로팅 바 */}
                    {selectedCells.size > 0 && (
                        <div className="fixed bottom-6 right-6 bg-gray-800 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-6 border border-gray-600 z-50 animate-fade-in">
                            <span className="text-sm">선택 항목수: <b className="text-blue-300">{selectedCells.size}</b></span>
                            <div className="h-6 w-px bg-gray-600"></div>
                            <span className="text-lg font-bold">합계: <span className="text-green-400">{selectedSum.toLocaleString()}</span></span>
                            <button onClick={() => setSelectedCells(new Map())} className="ml-2 text-gray-400 hover:text-white"><X size={16}/></button>
                        </div>
                    )}
                </div>
            );
        };

        // --- Result View (Includes manual_result logic) ---
        const ResultView = ({ currentDong, dongs, setCurrentDong, resultsByDong, projectInfo, isNoDongMode, openExcelModal, openStockModal, setViewMode }) => {
            const [resultTab, setResultTab] = useState('manual_result'); // App 2는 수동 결과가 메인
            const allResults = resultsByDong && currentDong ? resultsByDong[currentDong] : null;
            
            // 탭 자동 전환
            useEffect(() => {
                if (allResults && !allResults[resultTab]) {
                    if (allResults['manual_result']) setResultTab('manual_result');
                    else if (allResults['min_rows']) setResultTab('min_rows');
                }
            }, [currentDong, allResults]);

            const results = allResults ? allResults[resultTab] : null;
            const specKeys = results ? Object.keys(results).sort() : [];
            let overallSeq = 1;

            const handlePdfDownload = () => window.print();

            return (
                <div id="main-content" className="animate-fade-in pb-20 print:w-full print:m-0">
                    <div className="flex justify-between items-center mb-4 print:hidden">
                        <h2 className="text-lg font-bold text-gray-800">최종 출력 및 보고서 {isNoDongMode ? '' : `(${currentDong})`}</h2>
                        <div className="flex gap-2">
                            <button onClick={() => setViewMode('manual')} className="bg-indigo-50 border border-indigo-600 text-indigo-700 px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-indigo-100 transition flex items-center gap-2"><Edit3 size={16} /> CP 직접 편집</button>
                            <button onClick={openStockModal} className="bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-red-600 transition flex items-center gap-2"><Cloud size={16} /> 재고 차감 (선택)</button>
                            <button onClick={openExcelModal} className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-green-700 flex items-center gap-2 transition"><FileDown size={16} /> 엑셀 파일 저장</button>
                        </div>
                    </div>
                    
                    {!isNoDongMode && <DongTabs dongs={dongs} currentDong={currentDong} setCurrentDong={setCurrentDong} />}
                    
                    {(!allResults || !results) ? (<div className="text-center py-20 bg-white rounded-xl border border-dashed border-gray-300 text-gray-400"><p>현재 탭에 표시할 결과가 없습니다.</p></div>) : (
                        <div>
                            <div className="flex mb-4 border-b print:hidden gap-2">
                                {allResults['min_rows'] && <button onClick={() => setResultTab('min_rows')} className={`px-6 py-3 font-bold text-sm ${resultTab === 'min_rows' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}>① 초안: 작업 편의 (App1)</button>}
                                {allResults['min_loss'] && <button onClick={() => setResultTab('min_loss')} className={`px-6 py-3 font-bold text-sm ${resultTab === 'min_loss' ? 'border-b-2 border-green-600 text-green-600' : 'text-gray-500 hover:text-gray-700'}`}>② 초안: LOSS 최소화 (App1)</button>}
                                {allResults['manual_result'] && <button onClick={() => setResultTab('manual_result')} className={`px-6 py-3 font-bold text-sm ${resultTab === 'manual_result' ? 'border-b-2 border-purple-600 text-purple-600' : 'text-gray-500 hover:text-gray-700'}`}>③ 최종: 수동 편집 결과</button>}
                            </div>
                            <div className="space-y-8 bg-white p-8 rounded-xl shadow-sm border border-gray-200 min-h-screen print:border-none print:p-0">
                                {specKeys.map((specKey, idx) => {
                                    const { plan, summary } = results[specKey];
                                    let w = "?", h = "?", t = "?"; try { const dims = specKey.split(' ')[0] || ""; const tPart = specKey.split(' ')[1] || ""; if (dims.includes('*')) [w, h] = dims.split('*'); else if (dims.includes('x')) [w, h] = dims.split('x'); else { w = dims; h = ""; } t = tPart.replace('T', ''); } catch (e) { }
                                    const totalBarsDisplay = summary.totalBars || plan.reduce((acc, p) => acc + Number(p.qty || 0), 0);

                sortedStatKeys.forEach(k => { const d = statsMap[k]; grandInLen += (d.inputLen || 0); grandProdLen += (d.prodLen || 0); grandInWt += (d.inputWt || 0); grandProdWt += (d.prodWt || 0); const lossWt = (d.inputWt || 0) - (d.prodWt || 0); const r = worksheet.getRow(statsRowIdx); r.getCell(statsColStart).value = `${d.w}*${d.h}*${d.t}T`; r.getCell(statsColStart + 1).value = (d.inputLen / 1000); r.getCell(statsColStart + 2).value = (d.prodLen / 1000); r.getCell(statsColStart + 3).value = d.inputWt; r.getCell(statsColStart + 4).value = d.prodWt; r.getCell(statsColStart + 5).value = lossWt; for (let c = 0; c < 6; c++) { const cell = r.getCell(statsColStart + c); cell.border = borderAll; cell.alignment = alignCenter; cell.font = fontNormal; if (c > 0) cell.numFmt = '#,##0.000'; } statsRowIdx++; }); const statsTotalRow = worksheet.getRow(statsRowIdx); statsTotalRow.getCell(statsColStart).value = '전체 합계'; statsTotalRow.getCell(statsColStart + 1).value = (grandInLen / 1000); statsTotalRow.getCell(statsColStart + 2).value = (grandProdLen / 1000); statsTotalRow.getCell(statsColStart + 3).value = grandInWt; statsTotalRow.getCell(statsColStart + 4).value = grandProdWt; statsTotalRow.getCell(statsColStart + 5).value = (grandInWt - grandProdWt); for (let c = 0; c < 6; c++) { const cell = statsTotalRow.getCell(statsColStart + c); cell.style = { font: fontBold, fill: fillTotal, border: borderAll, alignment: alignCenter }; if (c > 0) cell.numFmt = '#,##0.000'; } 
                const rawStartRow = currentRow; let rawRowIdx = rawStartRow + 2; let rawTotalQtyCalc = 0; worksheet.mergeCells(rawStartRow, 1, rawStartRow, 5); worksheet.getRow(rawStartRow).getCell(1).value = '원본'; worksheet.getRow(rawStartRow).getCell(1).style = { font: fontBold, fill: fillHeader, alignment: alignCenter, border: borderAll }; const rawHeaderRow = worksheet.getRow(rawStartRow + 1); ['두께', '장변', '단변', '길이', '수량'].forEach((h, i) => { const cell = rawHeaderRow.getCell(i + 1); cell.value = h; cell.style = { font: fontBold, fill: fillHeader, alignment: alignCenter, border: borderAll }; }); const sortedStockKeys = Object.keys(stockSummary).sort((a, b) => { const [t1, w1, h1, l1] = a.split('|').map(Number); const [t2, w2, h2, l2] = b.split('|').map(Number); if (w1 !== w2) return w2 - w1; if (h1 !== h2) return h2 - h1; if (t1 !== t2) return t2 - t1; return l2 - l1; }); 
                sortedStockKeys.forEach(key => { const [t, w, h, l] = key.split('|'); const qty = stockSummary[key]; rawTotalQtyCalc += qty; const r = worksheet.getRow(rawRowIdx); r.getCell(1).value = t; r.getCell(2).value = w; r.getCell(3).value = h; r.getCell(4).value = Number(l); r.getCell(5).value = qty; const rowSpecKey = `${[parseInt(w), parseInt(h)].sort((a, b) => b - a).join('*')} ${t}T`; const cellFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: specColorMap[rowSpecKey] || "FFFFFFFF" } }; for (let c = 1; c <= 5; c++) { const cell = r.getCell(c); cell.border = borderAll; cell.alignment = alignCenter; cell.font = fontNormal; cell.fill = cellFill; } rawRowIdx++; }); const rawTotalRow = worksheet.getRow(rawRowIdx); rawTotalRow.getCell(1).value = '합계'; worksheet.mergeCells(rawRowIdx, 1, rawRowIdx, 4); rawTotalRow.getCell(5).value = rawTotalQtyCalc; [1, 2, 3, 4, 5].forEach(c => { const cell = rawTotalRow.getCell(c); cell.style = { font: fontBold, fill: fillTotal, border: borderAll, alignment: alignCenter }; }); 
                const prodStartRow = rawStartRow; let prodRowIdx = prodStartRow + 2; let prodTotalQtyCalc = 0; worksheet.mergeCells(prodStartRow, 7, prodStartRow, 12); worksheet.getRow(prodStartRow).getCell(7).value = '생산제품'; worksheet.getRow(prodStartRow).getCell(7).style = { font: fontBold, fill: fillHeader, alignment: alignCenter, border: borderAll }; const prodHeaderRow = worksheet.getRow(prodStartRow + 1); ['두께', '장변', '단변', '길이', '수량', '마킹'].forEach((h, i) => { const cell = prodHeaderRow.getCell(7 + i); cell.value = h; cell.style = { font: fontBold, fill: fillHeader, alignment: alignCenter, border: borderAll }; }); const sortedParts = Array.from(cutPartMap.values()).sort((a, b) => { if (a.w !== b.w) return b.w - a.w; if (a.h !== b.h) return b.h - a.h; if (a.t !== b.t) return b.t - a.t; if (b.length !== a.length) return b.length - a.length; return String(a.marking).localeCompare(String(b.marking)); }); 
                sortedParts.forEach(p => { prodTotalQtyCalc += p.qty; const r = worksheet.getRow(prodRowIdx); r.getCell(7).value = p.t; r.getCell(8).value = p.w; r.getCell(9).value = p.h; r.getCell(10).value = p.length; r.getCell(11).value = p.qty; r.getCell(12).value = p.marking; const cellFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: specColorMap[p.specKey] || "FFFFFFFF" } }; for (let c = 7; c <= 12; c++) { const cell = r.getCell(c); cell.border = borderAll; cell.alignment = alignCenter; cell.font = fontNormal; cell.fill = cellFill; } prodRowIdx++; }); const prodTotalRow = worksheet.getRow(prodRowIdx); prodTotalRow.getCell(7).value = '합계'; worksheet.mergeCells(prodRowIdx, 7, prodRowIdx, 10); prodTotalRow.getCell(11).value = prodTotalQtyCalc; [7, 8, 9, 10, 11, 12].forEach(c => { const cell = prodTotalRow.getCell(c); cell.style = { font: fontBold, fill: fillTotal, border: borderAll, alignment: alignCenter }; }); 
                const maxPrintRow = Math.max(mainTableEndRow, rawRowIdx, prodRowIdx); worksheet.pageSetup = { orientation: 'portrait', paperSize: 9, fitToPage: true, fitToWidth: 1, fitToHeight: 0, margins: { left: 0.25, right: 0.25, top: 0.5, bottom: 0.5, header: 0.3, footer: 0.3 }, printArea: `A1:M${maxPrintRow}` }; 
            };

            const handleExcelExport = async (targetType, modeData) => { 
                try { 
                    const targets = targetType === 'current' ? [currentDong] : dongs; 
                    let hasSheets = false; const masterWorkbook = new ExcelJS.Workbook(); 
                    
                    for (const dName of targets) { 
                        const res = resultsByDong[dName]; 
                        if (res) { 
                            // targetType === 'current' 이면 modeData는 string ('min_rows' 등)
                            // targetType === 'all' 이면 modeData는 object ({'1동':'min_rows', ...})
                            const selectedMode = typeof modeData === 'string' ? modeData : modeData[dName];
                            
                            if (res[selectedMode]) { 
                                const sheetName = `${dName}_${selectedMode === 'min_rows' ? '작업' : (selectedMode === 'min_loss' ? 'LOSS' : '수동')}`; 
                                const sheet = masterWorkbook.addWorksheet(sheetName); 
                                await fillWorksheet(sheet, dName, selectedMode); 
                                hasSheets = true; 
                            } 
                        } 
                    } 
                    if (hasSheets) { 
                        const buffer = await masterWorkbook.xlsx.writeBuffer(); 
                        let fileName = `${projectInfo.company || '업체명'}(${projectInfo.site || '현장명'})_생산용`; 
                        if (targetType === 'current' && !isNoDongMode) fileName += `-${currentDong}`; 
                        fileName += '.xlsx'; 
                        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }); 
                        saveAs(blob, fileName); 
                        setIsExcelModalOpen(false); 
                        alert("다운로드가 완료되었습니다."); 
                    } else { 
                        alert("선택하신 동/버전에 대한 계산 결과가 없습니다."); 
                    } 
                } catch (error) { 
                    console.error(error); alert("엑셀 저장 중 오류가 발생했습니다: " + error.message); 
                } 
            };

            const getColumnLetter = (colIndex) => {
                let temp, letter = '';
                while (colIndex > 0) { temp = (colIndex - 1) % 26; letter = String.fromCharCode(temp + 65) + letter; colIndex = (colIndex - temp - 1) / 26; }
                return letter;
            }

            const handleUpdateStock = async (targetType, modeData) => {
                if (!isLoggedIn) { alert("구글 로그인이 필요합니다."); return; }
                const usedMap = {}; 
                const targets = targetType === 'all' ? dongs : [currentDong];
                let hasData = false;

                targets.forEach(dName => {
                    const selectedMode = typeof modeData === 'string' ? modeData : modeData[dName];
                    if (resultsByDong[dName] && resultsByDong[dName][selectedMode]) {
                        const planResult = resultsByDong[dName][selectedMode];
                        hasData = true;
                        Object.keys(planResult).forEach(specKey => {
                            const { plan } = planResult[specKey];
                            plan.forEach(group => {
                                let w = "?", h = "?", t = "?"; try { const dims = specKey.split(' ')[0] || ""; const tPart = specKey.split(' ')[1] || ""; if (dims.includes('*')) [w, h] = dims.split('*'); else if (dims.includes('x')) [w, h] = dims.split('x'); t = tPart.replace('T', ''); } catch (e) { }
                                const key = `${parseInt(w)}|${parseInt(h)}|${t.trim()}|${group.stockLength}`;
                                if(!usedMap[key]) usedMap[key] = 0;
                                usedMap[key] += Number(group.qty);
                            });
                        });
                    }
                });

                if (!hasData) { alert("선택한 범위/모드에 대한 데이터가 없습니다."); return; }

                try {
                    const headerRange = 'Sheet1!H4:AK4';
                    const headerRes = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: SPREADSHEET_ID, range: headerRange });
                    const headers = headerRes.result.values ? headerRes.result.values[0] : [];
                    let emptyColIndex = headers.length; 
                    if(emptyColIndex >= 30) { alert("더 이상 기록할 빈 열이 없습니다 (AK열 초과)."); return; }
                    const targetColNum = 8 + emptyColIndex; 
                    const targetColLetter = getColumnLetter(targetColNum);

                    const updateData = [];
                    const companyName = `${projectInfo.company || '업체미상'}(${projectInfo.site || '현장미상'})`;
                    updateData.push({ range: `Sheet1!${targetColLetter}4`, values: [[companyName]] });

                    SHEET_ROW_MAP.forEach(map => {
                        const key = `${map.w}|${map.h}|${map.t}|${map.l}`;
                        if(usedMap[key]) {
                            updateData.push({ range: `Sheet1!${targetColLetter}${map.row}`, values: [[-usedMap[key]]] });
                        }
                    });

                    if(updateData.length === 1) { alert("차감할 재고 사용량이 없습니다."); return; }

                    await gapi.client.sheets.spreadsheets.values.batchUpdate({ spreadsheetId: SPREADSHEET_ID, resource: { data: updateData, valueInputOption: 'USER_ENTERED' } });
                    alert(`재고 차감이 완료되었습니다.\n기록된 열: ${targetColLetter}`);
                    setIsStockModalOpen(false);

                } catch (error) { console.error(error); alert("재고 차감 중 오류가 발생했습니다."); }
            };

            if (!isLoaded) return <ImportView onImport={handleImportData} />;

            return (
                <div className="min-h-screen bg-gray-50 text-gray-900 font-sans flex">
                    {/* Simplified Sidebar for App 2 */}
                    <div id="sidebar" className="w-64 bg-white border-r border-gray-200 h-screen flex flex-col fixed left-0 top-0 z-30 print:hidden">
                        <div className="p-6 border-b bg-indigo-50">
                            <h1 className="text-xl font-bold flex items-center gap-2 text-indigo-700"><Edit3 className="text-indigo-600" /> Smart CP Editor</h1>
                            <p className="text-xs text-indigo-500 mt-1">App 2: 생산 및 검토용</p>
                        </div>
                        <div className="p-4 space-y-4 flex-1 overflow-y-auto">
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-gray-500">불러온 프로젝트 정보 (조회 전용)</label>
                                <div className="p-3 bg-gray-50 rounded border text-sm font-bold">{projectInfo.company || '업체명 없음'}</div>
                                <div className="p-3 bg-gray-50 rounded border text-sm font-bold">{projectInfo.site || '현장명 없음'}</div>
                                {projectInfo.note && <div className="p-3 bg-gray-50 rounded border text-xs text-gray-600">{projectInfo.note}</div>}
                                <div className="flex flex-col gap-1 mt-2 text-xs text-gray-500">
                                    {projectInfo.isIronBanding && <div>✓ 철밴딩 동표기</div>}
                                    {projectInfo.isUnder1Ton && <div>✓ 1톤 미만 밴딩</div>}
                                    {isNoDongMode && <div>✓ 단일 CP 모드</div>}
                                </div>
                            </div>
                            <div className="space-y-1 mt-4">
                                <button onClick={() => setViewMode('original')} className={`w-full text-left px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 ${viewMode === 'original' ? 'bg-indigo-100 text-indigo-700' : 'text-gray-600 hover:bg-gray-50'}`}><ListTree size={16} /> 원본 견적 조회</button>
                                <button onClick={() => setViewMode('manual')} className={`w-full text-left px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 ${viewMode === 'manual' ? 'bg-indigo-100 text-indigo-700' : 'text-gray-600 hover:bg-gray-50'}`}><Edit3 size={16} /> CP 직접 편집</button>
                                <button onClick={() => setViewMode('result')} className={`w-full text-left px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 ${viewMode === 'result' ? 'bg-indigo-100 text-indigo-700' : 'text-gray-600 hover:bg-gray-50'}`}><FileDown size={16} /> 최종 보고서 (엑셀/차감)</button>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 ml-64 p-8 print:m-0 print:p-0">
                        {viewMode === 'original' && (<OriginalDataView currentDong={currentDong} dongs={dongs} setCurrentDong={setCurrentDong} dongData={dongData} isNoDongMode={isNoDongMode} />)}
                        {viewMode === 'manual' && (<ManualCPView currentDong={currentDong} dongs={dongs} setCurrentDong={setCurrentDong} manualData={manualData} setManualData={setManualData} projectInfo={projectInfo} onConvert={handleManualToResult} isNoDongMode={isNoDongMode} dongData={dongData} />)}
                        {viewMode === 'result' && (<ResultView currentDong={currentDong} dongs={dongs} setCurrentDong={setCurrentDong} resultsByDong={resultsByDong} projectInfo={projectInfo} isNoDongMode={isNoDongMode} openExcelModal={() => setIsExcelModalOpen(true)} openStockModal={() => setIsStockModalOpen(true)} setViewMode={setViewMode} />)}
                    </div>

                    <ExcelExportModal isOpen={isExcelModalOpen} onClose={() => setIsExcelModalOpen(false)} onConfirm={handleExcelExport} dongs={dongs} resultsByDong={resultsByDong} />
                    <StockDeductModal isOpen={isStockModalOpen} onClose={() => setIsStockModalOpen(false)} onConfirm={handleUpdateStock} dongs={dongs} isLoggedIn={isLoggedIn} handleLogin={handleLogin} />
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
